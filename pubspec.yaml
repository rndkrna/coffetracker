name: coffee_budget_tracker
description: "Coffee Budget Tracker - Aplikasi pencatat dan analisis pengeluaran kopi harian"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  sqflite: ^2.4.2
  path: ^1.9.1

  # Preferences & Session
  shared_preferences: ^2.3.4

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  crypto: ^3.0.6

  # Charts
  fl_chart: ^0.70.2

  # Image & OCR
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.14.0
  path_provider: ^2.1.5

  # Share / Export
  share_plus: ^13.1.0

  # GPS & Location (Tahap 7)
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  google_maps_flutter: ^2.5.3

  # HTTP Client
  http: ^1.2.2

  # URL Launcher
  url_launcher: ^6.3.1

  # Cached Network Image
  cached_network_image: ^3.4.1

  # Supabase & Router
  supabase_flutter: ^2.8.4
  flutter_dotenv: ^6.0.1
  go_router: ^17.3.0

  # AI Integration
  google_generative_ai: ^0.4.6
  sqflite_common_ffi_web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
